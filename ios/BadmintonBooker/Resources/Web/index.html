<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>羽毛球抢票控制台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>羽毛球抢票控制台</h1>
        <p id="subtitle">加载中...</p>
      </div>
      <div class="actions">

        <button id="checkTokenBtn">检查Token</button>
        <button id="startBtn" class="primary">开始</button>
        <button id="stopBtn" class="danger">停止</button>
      </div>
    </header>

    <nav class="tab-bar">
      <div id="tabList" class="tab-list"></div>
      <button id="addTabBtn" class="tab-add" title="新建任务" disabled>+</button>
    </nav>

    <main class="layout">
      <section class="panel controls">
        <h2 id="paramsTitle">抢票参数</h2>
        <div class="cells">
          <div class="cell cell-combo" onclick="document.getElementById('dateInput').showPicker?.()">
            <span class="cell-label">日期</span>
            <div class="combo-row">
              <div class="date-field">
                <input id="dateInput" type="date" />
                <span id="dateWeekday" class="date-weekday">未选择</span>
              </div>
              <label class="mini-field">间隔<input id="intervalInput" type="number" min="0.1" step="0.1" value="0.1" /></label>
              <label class="mini-field">次数<input id="maxAttemptsInput" type="number" min="0" value="100000" /></label>
            </div>
          </div>
          <div class="cell cell-combo">
            <span class="cell-label">定时启动</span>
            <div class="combo-row">
              <label class="toggle"><input id="scheduleEnabledInput" type="checkbox" /><span class="toggle-track"></span></label>
              <input id="scheduledStartInput" type="datetime-local" step="1" onclick="this.showPicker?.()" />
            </div>
          </div>
          <div class="cell cell-combo">
            <span class="cell-label">监听下单</span>
            <div class="combo-row">
              <label class="toggle"><input id="monitorEnabledInput" type="checkbox" /><span class="toggle-track"></span></label>
              <label class="mini-field">间隔<input id="monitorIntervalInput" type="number" min="1" step="1" value="20" /></label>
              <span class="mini-field">一次定两个</span><label class="toggle"><input id="pairModeInput" type="checkbox" /><span class="toggle-track"></span></label>
            </div>
          </div>
          <div class="cell cell-toggle" style="display:none">
            <span class="cell-label">dry-run</span>
            <label class="toggle"><input id="dryRunInput" type="checkbox" /><span class="toggle-track"></span></label>
          </div>
          <div class="cell cell-combo no-border">
            <div class="combo-row">
              <button id="tplMorningBtn" type="button" class="cell-btn">早场 9-10</button>
              <button id="tplFriEveBtn" type="button" class="cell-btn">周五晚 20-22</button>
              <button id="tplFriEve2Btn" type="button" class="cell-btn">周五晚 19-20</button>
            </div>
          </div>
          <div class="cell cell-combo no-border">
            <div class="combo-row">
              <div class="cell cell-params text-field editable-field">
                <span class="cell-label">wx-token</span>
                <span id="wxTokenDisplay" class="text-display editable-display"></span>
                <input id="wxTokenInput" autocomplete="off" style="display:none" />
              </div>
              <div class="cell cell-params text-field editable-field">
                <span class="cell-label">shop-id</span>
                <span id="shopIdDisplay" class="text-display editable-display"></span>
                <input id="shopIdInput" type="text" style="display:none" />
              </div>
              <div class="cell cell-params text-field editable-field">
                <span class="cell-label">brand-code</span>
                <span id="brandCodeDisplay" class="text-display editable-display"></span>
                <input id="brandCodeInput" type="text" style="display:none" />
              </div>
            </div>
          </div>
        </div>

        <div class="section-head">
          <h3>场地时间</h3>
          <button id="clearSelectionBtn" type="button" class="ghost-btn">清空选择</button>
        </div>
        <p class="field-hint" id="fieldHint">普通抢票可直接选择可预约目标；监听模式需要先查询实时状态，只能选择"不可预约"的场地时间。</p>
        <div id="scheduleGrid" class="schedule-grid"></div>
      </section>


      <section class="panel log-panel">
        <div id="logResizeHandle" class="log-resize-handle" title="向上拖动放大日志区域"></div>
        <div class="panel-head">
          <h2>日志</h2>
          <div class="log-controls">
            <label class="toggle-label">
              自动滚动
              <label class="toggle"><input id="autoScrollInput" type="checkbox" checked /><span class="toggle-track"></span></label>
            </label>
            <button id="clearLogsBtn" class="danger" type="button">清除日志</button>
          </div>
        </div>
        <div class="log-stack">
          <div id="successLogView" class="success-log-view" aria-label="成功日志"></div>
          <div id="logView" class="log-view" aria-label="普通日志"></div>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
