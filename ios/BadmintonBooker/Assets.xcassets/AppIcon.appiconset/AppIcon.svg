<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1DA840"/>
      <stop offset="50%" stop-color="#22C94E"/>
      <stop offset="100%" stop-color="#14802E"/>
    </linearGradient>
    <linearGradient id="corkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#D4A76A"/>
    </linearGradient>
    <linearGradient id="handleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B8915A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="gripGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3AAF5A"/>
      <stop offset="100%" stop-color="#25804A"/>
    </linearGradient>
  </defs>
  
  <rect width="1024" height="1024" rx="224" fill="url(#bgGrad)"/>
  
  <!-- Shuttlecock feathers -->
  <g transform="translate(460, 420)">
    <!-- Left feathers -->
    <path d="M 0,-20 L -90,130 L -60,135 L 0,0 Z" fill="white" opacity="0.92"/>
    <path d="M 0,-20 L -150,115 L -120,125 L 0,0 Z" fill="#F0F0F0" opacity="0.88"/>
    <path d="M 0,-20 L -190,80 L -165,95 L 0,0 Z" fill="white" opacity="0.92"/>
    
    <!-- Right feathers -->
    <path d="M 0,-20 L 90,130 L 60,135 L 0,0 Z" fill="white" opacity="0.92"/>
    <path d="M 0,-20 L 150,115 L 120,125 L 0,0 Z" fill="#F0F0F0" opacity="0.88"/>
    <path d="M 0,-20 L 190,80 L 165,95 L 0,0 Z" fill="white" opacity="0.92"/>
    
    <!-- Center feathers -->
    <path d="M 0,-20 L -30,140 L 30,140 L 0,0 Z" fill="white" opacity="0.95"/>
    
    <!-- Feather center lines -->
    <line x1="0" y1="-15" x2="-80" y2="128" stroke="#DDD" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="80" y2="128" stroke="#DDD" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="-140" y2="113" stroke="#DDD" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="140" y2="113" stroke="#DDD" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="-185" y2="83" stroke="#DDD" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="185" y2="83" stroke="#DDD" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-15" x2="0" y2="135" stroke="#DDD" stroke-width="2" opacity="0.5"/>
  </g>
  
  <!-- Cork base -->
  <ellipse cx="460" cy="590" rx="65" ry="80" fill="url(#corkGrad)"/>
  <ellipse cx="460" cy="590" rx="65" ry="80" fill="none" stroke="#A08050" stroke-width="4"/>
  
  <!-- Cork bands -->
  <line x1="400" y1="570" x2="520" y2="570" stroke="#A08050" stroke-width="3" opacity="0.4"/>
  <line x1="395" y1="595" x2="525" y2="595" stroke="#A08050" stroke-width="3" opacity="0.4"/>
  <line x1="400" y1="620" x2="520" y2="620" stroke="#A08050" stroke-width="3" opacity="0.4"/>
  
  <!-- Racket head -->
  <g transform="translate(720, 700) rotate(-25)">
    <ellipse cx="0" cy="0" rx="110" ry="140" fill="#007030" fill-opacity="0.75"/>
    <ellipse cx="0" cy="0" rx="110" ry="140" fill="none" stroke="white" stroke-width="7"/>
    
    <!-- Strings -->
    <g stroke="white" stroke-width="1.5" opacity="0.3">
      <!-- Vertical strings -->
      <line x1="-80" y1="-125" x2="-80" y2="125"/>
      <line x1="-50" y1="-135" x2="-50" y2="135"/>
      <line x1="-20" y1="-139" x2="-20" y2="139"/>
      <line x1="10" y1="-139" x2="10" y2="139"/>
      <line x1="40" y1="-135" x2="40" y2="135"/>
      <line x1="70" y1="-125" x2="70" y2="125"/>
      
      <!-- Horizontal strings -->
      <line x1="-100" y1="-110" x2="100" y2="-110"/>
      <line x1="-107" y1="-80" x2="107" y2="-80"/>
      <line x1="-109" y1="-50" x2="109" y2="-50"/>
      <line x1="-110" y1="-20" x2="110" y2="-20"/>
      <line x1="-110" y1="10" x2="110" y2="10"/>
      <line x1="-109" y1="40" x2="109" y2="40"/>
      <line x1="-107" y1="70" x2="107" y2="70"/>
      <line x1="-100" y1="100" x2="100" y2="100"/>
    </g>
    
    <!-- Handle -->
    <path d="M -18,140 L 18,140 L 14,280 L -14,280 Z" fill="url(#handleGrad)"/>
    <path d="M -16,210 L 16,210 L 14,280 L -14,280 Z" fill="url(#gripGrad)"/>
  </g>
</svg>
